services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - HTTP_PORT=8080
      - SQLITE_PATH=/data/taskforge.db
      - LOG_LEVEL=info
      - API_KEY=default
    volumes:
      - taskforge_data:/data
    command: ["./api"]

  worker:
    build: .
    environment:
      - SQLITE_PATH=/data/taskforge.db
      - LOG_LEVEL=info
      - WORKER_CONCURRENCY=10
      - WORKER_TENANTS=default
      - WORKER_JOB_TYPES=echo,email,report,webhook
    volumes:
      - taskforge_data:/data
    depends_on:
      - api
    command: ["./worker"]

volumes:
  taskforge_data:
